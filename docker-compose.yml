version: '3.8'

name: multiagent3

services:
  backend:
    platform: linux/amd64
    build: .
    ports:
      - "8000:8000"
      - "8080:8080"
      - "54545:54545" # Claude OAuth Callback
      - "1455:1455"   # Codex OAuth Callback
      - "8085:8085"   # Gemini OAuth Callback
    volumes:
      - council_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    platform: linux/amd64
    build: frontend2
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  council_data:
